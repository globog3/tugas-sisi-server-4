version: "3.9"

services:
  app:
    build: .
    container_name: lms-app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    ports:
      - "6379:6379"
